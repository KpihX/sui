name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bash syntax check
        run: bash -n sui.sh tests/run-stub-tests.sh

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Shellcheck
        run: shellcheck sui.sh

      - name: Smoke --help
        run: ./sui.sh --help >/dev/null

      - name: Smoke doctor
        run: ./sui.sh --doctor >/dev/null

      - name: Stub tests
        run: tests/run-stub-tests.sh
